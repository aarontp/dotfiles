# Behave like screen
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix
bind-key a send-prefix
bind space next
bind C-space next
bind C-n next
bind C-p prev
# Vim like
bind h prev
bind l next

setw -g mode-keys vi

# Mouse support
set -g mouse on

set -g default-terminal "screen-256color"

set -sg escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g renumber-windows on

# status bar
set-option -g status-justify left
set-option -g status-style 'fg=white,bg=black'
set-option -g message-style 'fg=black,bg=white'
set-option -g status-interval 60
set-option -g status-left-length 30
set-option -g status-left  '[#S]#[default]'
set-option -g status-right '#[fg=cyan]#h %F %R'
set-option -g visual-activity on
set-window-option -g monitor-activity off
set-window-option -g window-status-current-style 'fg=red,bold'

setw -g window-status-current-format "#[fg=green,bold]#I: #W"
setw -g window-status-format "#[fg=white,dim]#I: #W"

# From https://wiki.archlinux.org/index.php/tmux#Clients_simultaneously_interacting_with_various_windows_of_a_session :
# It causes tmux to resize a window based on the smallest client actually viewing it, not on the smallest one attached to the entire session.
setw -g aggressive-resize on
